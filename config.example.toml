# NSFW API設定サンプル
# このファイルをconfig.tomlにコピーして、必要に応じて設定を調整してください

# バインドするサーバーアドレス
# フォーマット: "host:port"
# 例：
#   "127.0.0.1:3000" - localhostからのみアクセス可能（ポート3000）
#   "0.0.0.0:3000"   - 任意のネットワークインターフェースからアクセス可能（ポート3000）
address = "127.0.0.1:3000"

# レスポンスヘッダーにNC-timeを追加するかどうか
# falseに設定すると、NC-timeヘッダーは返されません
add_nc_time_header = true
